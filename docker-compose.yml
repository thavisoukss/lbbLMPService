version: "3.9"

services:
  lmps-service:
    image: "172.16.4.62:5000/noh/lmps-payment:v1.0.0"
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      TZ: "Asia/Bangkok"
      # Secure Production Key Injection Options:
      # Option A: Inject private key content directly as environment variable (YAML multiline format)
      # JWT_PRIVATE_KEY: |
      #   -----BEGIN PRIVATE KEY-----
      #   MIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQDXpAiTGnQc+Gu1
      #   XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
      #   JpuD5YKYzChdA5fk3hFQ8NQz
      #   -----END PRIVATE KEY-----
      #
      # Option B: Point to a securely mounted file path
      # JWT_PRIVATE_KEY_PATH: "/config/keys/prod-private.pem"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - lmps_payment_logs:/usr/app/logs
      # If using Option B, mount the key file securely (read-only):
      # - /path/to/host/prod-private.pem:/config/keys/prod-private.pem:ro
    networks:
      - lbb_network

networks:
  lbb_network:
    external: true

volumes:
  lmps_payment_logs: