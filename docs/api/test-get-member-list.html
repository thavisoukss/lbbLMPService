<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMPS API Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">

<!-- ═══════════════════════════════════════════
     LOGIN VIEW
════════════════════════════════════════════ -->
<div id="loginView" class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-sm space-y-6">

    <div class="text-center space-y-1">
      <h1 class="text-2xl font-bold text-white">LMPS API Tester</h1>
      <p class="text-sm text-gray-500">Sign in to continue</p>
    </div>

    <!-- Error banner -->
    <div id="loginErr" class="hidden flex items-center gap-2 bg-red-950 border border-red-800 text-red-300 text-sm rounded-lg px-4 py-2.5">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      <span id="loginErrText"></span>
    </div>

    <div class="bg-gray-900 border border-gray-700 rounded-xl p-6 space-y-4">

      <div class="space-y-1">
        <label class="block text-sm text-gray-400">Phone</label>
        <input id="loginPhone" type="text" value="2097778968"
          class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2.5 text-sm font-mono text-gray-200 focus:outline-none focus:border-blue-500" />
      </div>

      <div class="space-y-1">
        <label class="block text-sm text-gray-400">Password</label>
        <input id="loginPassword" type="password" value="P@r97778968"
          class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2.5 text-sm font-mono text-gray-200 focus:outline-none focus:border-blue-500" />
      </div>

      <button id="loginBtn" onclick="doLogin()"
        class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-900 disabled:text-blue-600 text-white font-semibold text-sm px-4 py-2.5 rounded-lg transition-colors mt-2">
        <svg id="loginSpinner" class="hidden w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"/>
          <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 100 16v-4l-3 3 3 3v-4a8 8 0 01-8-8z"/>
        </svg>
        Login
      </button>
    </div>

    <p class="text-center text-xs text-gray-600">
      Requires <code class="text-gray-500">node proxy.js</code> running on localhost:3000
    </p>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MEMBER LIST VIEW
════════════════════════════════════════════ -->
<div id="memberView" class="hidden min-h-screen p-8">
  <div class="max-w-2xl mx-auto space-y-5">

    <!-- Header -->
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold text-white">GET Member List</h1>
        <div class="inline-flex items-center gap-2 bg-gray-800 border border-gray-700 rounded-md px-3 py-1.5 text-xs text-gray-400 mt-1">
          <span class="bg-green-800 text-green-300 font-bold text-xs px-2 py-0.5 rounded">GET</span>
          /api/lmps/get-member-list
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p id="sessionPhone" class="text-sm text-gray-300 font-mono"></p>
          <p id="sessionCustomerId" class="text-xs text-gray-500"></p>
        </div>
        <button onclick="doLogout()"
          class="flex items-center gap-1.5 text-sm text-gray-400 border border-gray-700 hover:text-red-300 hover:border-red-800 px-3 py-1.5 rounded-lg transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
          </svg>
          Logout
        </button>
      </div>
    </div>

    <!-- Headers card -->
    <div class="bg-gray-900 border border-gray-700 rounded-xl p-5 space-y-4">
      <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500">Request Headers</h2>

      <div class="space-y-1">
        <label class="block text-sm text-gray-400">Device-ID <span class="text-red-400">*</span></label>
        <input id="deviceId" type="text" value="abc-123" readonly
          class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono text-gray-400 cursor-not-allowed" />
      </div>

      <div class="space-y-1">
        <label class="block text-sm text-gray-400">Authorization — Bearer Token <span class="text-red-400">*</span></label>
        <input id="bearerToken" type="text" placeholder="Auto-filled after login" readonly
          class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono text-gray-400 cursor-not-allowed" />
        <p class="text-xs text-gray-600">The prefix <code class="text-gray-500">Bearer </code> is added automatically.</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <button id="sendBtn" onclick="sendRequest()"
        class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-900 disabled:text-blue-600 text-white font-semibold text-sm px-6 py-2.5 rounded-lg transition-colors">
        <svg id="sendSpinner" class="hidden w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"/>
          <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 100 16v-4l-3 3 3 3v-4a8 8 0 01-8-8z"/>
        </svg>
        Send Request
      </button>
      <button onclick="clearResponse()"
        class="text-sm text-gray-500 border border-gray-700 hover:text-gray-200 hover:border-gray-500 px-4 py-2.5 rounded-lg transition-colors">
        Clear
      </button>
    </div>

    <!-- Error banner -->
    <div id="memberErr" class="hidden flex items-center gap-2 bg-red-950 border border-red-800 text-red-300 text-sm rounded-lg px-4 py-2.5">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      <span id="memberErrText"></span>
    </div>

    <!-- Response card -->
    <div class="bg-gray-900 border border-gray-700 rounded-xl p-5 space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500">Response</h2>
        <div class="flex items-center gap-2">
          <span id="statusPill" class="hidden text-xs font-bold px-2.5 py-0.5 rounded-full"></span>
          <span id="durationTag" class="text-xs text-gray-500"></span>
          <button onclick="copyResponse()" class="text-xs text-gray-500 border border-gray-700 hover:text-gray-200 px-2 py-0.5 rounded transition-colors">Copy</button>
        </div>
      </div>

      <!-- Member list -->
      <div id="memberList" class="hidden divide-y divide-gray-800 border border-gray-700 rounded-lg overflow-hidden"></div>

      <!-- Raw JSON -->
      <pre id="rawJson"
        class="bg-gray-950 border border-gray-700 rounded-lg p-4 text-xs font-mono overflow-x-auto whitespace-pre-wrap break-words min-h-[60px] text-gray-600 italic">— response will appear here —</pre>
    </div>

  </div>
</div>

<script>
  var LOGIN_URL  = '/proxy/login';
  var MEMBER_URL = '/proxy/get-member-list';

  /* ── Login ── */
  function doLogin() {
    var phone    = document.getElementById('loginPhone').value.trim();
    var password = document.getElementById('loginPassword').value.trim();

    if (!phone || !password) {
      showLoginErr('Phone and password are required.');
      return;
    }

    setLoginLoading(true);

    fetch(LOGIN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone, password: password })
    })
    .then(function(res) {
      return res.json().then(function(json) {
        if (json.status === 'success' && json.data && json.data.access_token) {
          var token = json.data.access_token;
          document.getElementById('bearerToken').value    = token;
          document.getElementById('sessionPhone').textContent      = json.data.phone || phone;
          document.getElementById('sessionCustomerId').textContent = json.data.customer_id || '';
          showView('member');
        } else {
          showLoginErr(json.message || 'Login failed (status: ' + res.status + ')');
        }
        setLoginLoading(false);
      });
    })
    .catch(function(err) {
      showLoginErr('Network error: ' + err.message);
      setLoginLoading(false);
    });
  }

  function doLogout() {
    document.getElementById('bearerToken').value = '';
    document.getElementById('sessionPhone').textContent = '';
    document.getElementById('sessionCustomerId').textContent = '';
    clearResponse();
    showView('login');
  }

  function showView(view) {
    document.getElementById('loginView').classList.toggle('hidden', view !== 'login');
    document.getElementById('memberView').classList.toggle('hidden', view !== 'member');
  }

  function showLoginErr(msg) {
    document.getElementById('loginErrText').textContent = msg;
    document.getElementById('loginErr').classList.remove('hidden');
  }

  function setLoginLoading(on) {
    document.getElementById('loginBtn').disabled = on;
    document.getElementById('loginSpinner').classList.toggle('hidden', !on);
  }

  /* ── Member list ── */
  function sendRequest() {
    var deviceId    = document.getElementById('deviceId').value.trim();
    var bearerToken = document.getElementById('bearerToken').value.trim();

    if (!deviceId || !bearerToken) {
      showMemberErr('Device-ID and Authorization token are required.');
      return;
    }
    hideMemberErr();

    setSendLoading(true);
    var t0 = Date.now();

    fetch(MEMBER_URL, {
      method: 'GET',
      headers: {
        'Device-ID':     deviceId,
        'Authorization': 'Bearer ' + bearerToken
      }
    })
    .then(function(res) {
      var status   = res.status;
      var duration = Date.now() - t0;
      return res.text().then(function(text) {
        var parsed = null;
        var pretty = text;
        try { parsed = JSON.parse(text); pretty = JSON.stringify(parsed, null, 2); } catch(e) {}
        setStatus(status, duration);
        setRaw(pretty);
        renderList(parsed);
        setSendLoading(false);
      });
    })
    .catch(function(err) {
      setStatus(null, Date.now() - t0);
      setRaw('Network error: ' + err.message);
      renderList(null);
      setSendLoading(false);
    });
  }

  function renderList(data) {
    var el = document.getElementById('memberList');
    if (!data || !Array.isArray(data.data) || data.data.length === 0) {
      el.classList.add('hidden');
      el.innerHTML = '';
      return;
    }
    var html = '';
    for (var i = 0; i < data.data.length; i++) {
      var m      = data.data[i];
      var name   = m.bankNameEn || m.memberName || '-';
      var imgSrc = m.imageUrl   || '';
      var st     = (m.status || '').toString();
      var isActive  = st === '1' || st.toUpperCase() === 'ACTIVE';
      var badgeCls  = isActive ? 'bg-green-900 text-green-300' : 'bg-gray-700 text-gray-400';
      var badgeLabel = isActive ? 'ACTIVE' : 'INACTIVE';
      html += '<div class="flex items-center gap-3 px-3 py-2.5 hover:bg-gray-800 transition-colors">'
            + '<img src="' + imgSrc + '" alt="' + name + '" width="20" height="20"'
            + ' class="rounded object-contain bg-gray-950 flex-shrink-0"'
            + ' onerror="this.style.display=\'none\'" />'
            + '<span class="flex-1 text-sm text-gray-200">' + name + '</span>'
            + '<span class="text-xs font-semibold px-2 py-0.5 rounded-full ' + badgeCls + '">' + badgeLabel + '</span>'
            + '</div>';
    }
    el.innerHTML = html;
    el.classList.remove('hidden');
  }

  function setStatus(status, duration) {
    var pill = document.getElementById('statusPill');
    pill.className = 'text-xs font-bold px-2.5 py-0.5 rounded-full';
    if (status === null) {
      pill.textContent = 'ERROR';
      pill.classList.add('bg-red-900', 'text-red-300');
    } else if (status >= 200 && status < 300) {
      pill.textContent = status + ' OK';
      pill.classList.add('bg-green-900', 'text-green-300');
    } else if (status >= 400 && status < 500) {
      pill.textContent = status + ' Client Error';
      pill.classList.add('bg-red-900', 'text-red-300');
    } else {
      pill.textContent = status + ' Server Error';
      pill.classList.add('bg-yellow-900', 'text-yellow-300');
    }
    pill.classList.remove('hidden');
    document.getElementById('durationTag').textContent = duration + ' ms';
  }

  function setRaw(text) {
    var pre = document.getElementById('rawJson');
    pre.textContent = text;
    pre.classList.remove('text-gray-600', 'italic');
    pre.classList.add('text-cyan-300');
  }

  function setSendLoading(on) {
    document.getElementById('sendBtn').disabled = on;
    document.getElementById('sendSpinner').classList.toggle('hidden', !on);
  }

  function showMemberErr(msg) {
    document.getElementById('memberErrText').textContent = msg;
    document.getElementById('memberErr').classList.remove('hidden');
  }

  function hideMemberErr() {
    document.getElementById('memberErr').classList.add('hidden');
  }

  function clearResponse() {
    var pre = document.getElementById('rawJson');
    pre.textContent = '— response will appear here —';
    pre.classList.add('text-gray-600', 'italic');
    pre.classList.remove('text-cyan-300');
    var pill = document.getElementById('statusPill');
    pill.textContent = '';
    pill.classList.add('hidden');
    document.getElementById('durationTag').textContent = '';
    hideMemberErr();
    renderList(null);
  }

  function copyResponse() {
    var text = document.getElementById('rawJson').textContent;
    if (navigator.clipboard) navigator.clipboard.writeText(text);
  }

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      if (!document.getElementById('loginView').classList.contains('hidden')) doLogin();
      else sendRequest();
    }
  });
</script>
</body>
</html>
